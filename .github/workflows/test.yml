name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
    - run: |
        corepack enable
        yarn install --frozen-lockfile

    - run: yarn run lint --no-fix --max-warnings 0
    - run: yarn run test:unit